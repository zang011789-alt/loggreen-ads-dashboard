<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1225">
<title>Frame 50 — 화이트 버전</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ccc; display: flex; justify-content: center; }
.page {
  position: relative;
  width: 1225px;
  height: 15244px;
  background: white;
  overflow: hidden;
}
.page img { display: block; }
.abs { position: absolute; }
.cover { width: 100%; height: 100%; object-fit: cover; }
video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.text-section {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 100px;
  line-height: 1.18;
  color: #000;
  white-space: nowrap;
  position: absolute;
}
.label-badge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #000;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 20px;
  z-index: 999;
  letter-spacing: 0.05em;
  border: 1px solid #ddd;
}
</style>
</head>
<body>
<div class="label-badge">Frame 50 · WHITE BG</div>
<div class="page">

  <!-- 최상단 헤더 이미지 -->
  <div class="abs" style="left:0;top:0;width:1225px;height:746px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/61a33e16-7512-4f79-a939-4c6305c5a6e4" alt="">
  </div>
  <!-- 오버레이 상단 -->
  <div class="abs" style="left:0;top:6px;width:1222px;height:304px;overflow:hidden;">
    <img style="position:absolute;width:100.07%;height:106.58%;top:-6.58%;left:-0.03%;object-fit:cover;" src="https://www.figma.com/api/mcp/asset/119e0d48-5089-477b-aecd-a12a2c9b960a" alt="">
  </div>
  <!-- 제품 중앙 이미지 -->
  <div class="abs" style="left:0;top:261px;width:1225px;height:1225px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/92529f48-f5b4-473a-8772-c33af6f961c4" alt="">
  </div>

  <!-- image 608 -->
  <div class="abs" style="left:0;top:1500px;width:1225px;height:577px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/ef117a5d-faca-489c-ac0d-619e6be5efa9" alt="">
  </div>
  <!-- image 617 -->
  <div class="abs" style="left:0;top:2212px;width:1225px;height:1370px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/d8725161-a53e-4579-934e-0aaf88557f21" alt="">
  </div>
  <!-- image 618 -->
  <div class="abs" style="left:0;top:3555px;width:1225px;height:1364px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/49c782d7-2f77-4f56-8820-00b450db0690" alt="">
  </div>
  <!-- image 619 -->
  <div class="abs" style="left:0;top:4919px;width:1225px;height:1597px;">
    <img class="cover" src="https://www.figma.com/api/mcp/asset/7926c04f-9b90-4d5d-b81f-8d5659130bbd" alt="">
  </div>
  <!-- image 620 -->
  <div class="abs" style="left:0;top:6533px;width:1225px;height:1443px;">

  </div>

  <!-- Rectangle 200: 흰색 구분선 -->
  <div class="abs" style="left:0;top:7967px;width:1225px;height:192px;background:#fff;"></div>

  <!-- 1번gif → vid1.mp4 -->
  <div class="abs" style="left:0;top:8159px;width:1225px;height:922px;">
    <video autoplay loop muted playsinline>
      <source src="vid1.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Rectangle 202: 화이트 배경 섹션 -->

  <!-- 텍스트: 20ml 대용량 -->

    <div>20ml 대용량.</div>
    <div>2주 가능.</div>
  </div>

  <!-- 2번gif → vid2.mp4 -->

  </div>

  <!-- 3번gif → vid3.mp4 -->

  </div>

  <!-- 텍스트: 안전하다 -->
  <div class="text-section" style="left:112px;top:12224px;">

    <div>유해물질 없음.</div>
  </div>

  <!-- 4번gif → vid4.mp4 -->
  <div class="abs" style="left:0;top:12766px;width:1225px;height:920px;">
    <video autoplay loop muted playsinline>
      <source src="vid4.mp4" type="video/mp4">

  </div>

  <!-- 텍스트: 잘 보인다 -->
  <div class="text-section" style="left:112px;top:13845px;">
    <div>잘 보인다.</div>
    <div>실시간으로.</div>
  </div>

</div>
</body>
</html>
