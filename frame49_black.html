<title>Frame 49 — 블랙 버전</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; }
.page {
  position: relative;
  width: 1225px;
  height: 15691px;
  background: white;
  overflow: hidden;
}
.page img { display: block; }
.abs { position: absolute; }
.cover { width: 100%; height: 100%; object-fit: cover; }
video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.text-section {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 100px;
  line-height: 1.18;
  color: #b8b8b8;
  white-space: nowrap;
  position: absolute;
}
.label-badge {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 20px;
  z-index: 999;
  letter-spacing: 0.05em;
}
</style>
</head>
