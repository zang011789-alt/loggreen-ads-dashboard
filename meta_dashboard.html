<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그린팀 광고 대시보드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 20,45 35,45 20,75 45,75 45,95 55,95 55,75 80,75 65,45 80,45' fill='%2322c55e'/></svg>">
<script src="cafe24_data.js" onerror="window.CAFE24_DATA=null"></script>
<script src="cafe24_history.js" onerror="window.CAFE24_HISTORY=null"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e2e8f0; font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; min-height: 100vh; }

/* ── BRAND SELECT SCREEN ── */
#brandScreen {
  position: fixed; inset: 0; background: #0d1117;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; gap: 28px; overflow-y: auto; padding: 32px 20px;
}
.brand-screen-logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.02em; }
.brand-screen-logo em { color: #4ade80; font-style: normal; }
.brand-screen-title { font-size: 28px; font-weight: 800; color: #f0f6fc; letter-spacing: -0.5px; text-align: center; }
.brand-screen-sub { font-size: 14px; color: #6e7681; margin-top: 6px; text-align: center; }
.brand-cards { display: flex; gap: 20px; }
.brand-card {
  width: 220px; padding: 32px 24px; border-radius: 16px; cursor: pointer;
  border: 1.5px solid #21262d; background: #161b22;
  transition: all 0.2s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.brand-card:hover { border-color: var(--bc, #4ade80); transform: translateY(-3px); box-shadow: 0 12px 40px #00000060; }
.brand-card.ridermune { --bc: #4ade80; }
.brand-card.outcoma   { --bc: #a78bfa; }
.brand-card-badge {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
}
.ridermune .brand-card-badge { background: #4ade8018; color: #4ade80; }
.outcoma   .brand-card-badge { background: #a78bfa18; color: #a78bfa; }
.brand-card-name { font-size: 20px; font-weight: 800; color: #f0f6fc; }
.brand-card-products { font-size: 12px; color: #6e7681; line-height: 1.7; }

/* ── DASHBOARD ── */
#dashboard { display: none; }

/* HEADER */
header {
  background: #161b22; border-bottom: 1px solid #21262d;
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
.logo em { color: #4ade80; font-style: normal; }
.brand-badge-header {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.brand-badge-header:hover { opacity: 0.8; }
.brand-badge-header.ridermune { background: #4ade8018; color: #4ade80; border: 1px solid #4ade8040; }
.brand-badge-header.outcoma   { background: #a78bfa18; color: #a78bfa; border: 1px solid #a78bfa40; }
.header-right { display: flex; align-items: center; gap: 14px; }
.last-updated { font-size: 12px; color: #6e7681; }
.refresh-btn {
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.refresh-btn:hover { background: #30363d; }
.refresh-btn.loading { opacity: 0.6; pointer-events: none; }

/* CONTAINER */
.container { max-width: 1440px; margin: 0 auto; padding: 20px 28px; }

/* CONTROLS */
.controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
.ctrl-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.tab-group { display: flex; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 3px; gap: 2px; }
.tab-btn {
  padding: 6px 13px; border-radius: 6px; cursor: pointer; font-size: 13px;
  color: #6e7681; transition: all 0.15s; border: none; background: none; white-space: nowrap;
}
.tab-btn:hover { color: #c9d1d9; }
.date-group    .tab-btn.active { background: #388bfd20; color: #58a6ff; }
.level-group   .tab-btn.active { background: #e3b34120; color: #e3b341; }
.product-group .tab-btn.active { background: #3fb95020; color: #3fb950; }

.date-range {
  display: flex; align-items: center; gap: 8px;
  background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 5px 12px;
}
.date-range input[type="date"] {
  background: transparent; border: none; color: #c9d1d9; font-size: 13px; outline: none; cursor: pointer; color-scheme: dark;
}
.date-range .sep { color: #4e5564; font-size: 13px; }
.date-apply {
  background: #388bfd; border: none; color: #fff; padding: 4px 10px;
  border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.15s;
}
.date-apply:hover { opacity: 0.85; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
.kpi-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 14px; position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent, #388bfd); opacity: 0.7; }
.kpi-label { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.kpi-value { font-size: 19px; font-weight: 700; color: #f0f6fc; letter-spacing: -0.5px; line-height: 1; }
.kpi-sub   { font-size: 10px; color: #6e7681; margin-top: 4px; }
.kpi-card.spend  { --accent: #388bfd; }
.kpi-card.purch  { --accent: #3fb950; }
.kpi-card.roas   { --accent: #a371f7; }
.kpi-card.cpp    { --accent: #f78166; }
.kpi-card.impr   { --accent: #e3b341; }
.kpi-card.clicks { --accent: #79c0ff; }
.roas-good { color: #3fb950 !important; }
.roas-mid  { color: #e3b341 !important; }
.roas-bad  { color: #f78166 !important; }

/* TABLE */
.table-section { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; }
.table-header-row { padding: 13px 18px; border-bottom: 1px solid #21262d; display: flex; align-items: center; justify-content: space-between; }
.table-title { font-size: 14px; font-weight: 600; color: #f0f6fc; }
.table-meta  { font-size: 12px; color: #6e7681; }
table { width: 100%; border-collapse: collapse; }
th {
  padding: 8px 11px; text-align: left; font-size: 10.5px; font-weight: 600;
  color: #6e7681; text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid #21262d; white-space: nowrap; cursor: pointer; user-select: none;
}
th:hover { color: #c9d1d9; }
td { padding: 7px 11px; font-size: 12px; color: #c9d1d9; border-bottom: 1px solid #161b22; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #1c2128; }
.cell-name { max-width: 240px; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; font-size: 12px; }
.cell-sub  { max-width: 180px; overflow: hidden; text-overflow: ellipsis; color: #6e7681; font-size: 11px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
/* 리더뮨 제품 태그 */
.tag-kd  { background: #0284c720; color: #38bdf8; border: 1px solid #0284c740; }
.tag-yb  { background: #0d944720; color: #34d399; border: 1px solid #0d944740; }
.tag-np  { background: #16a34a20; color: #86efac; border: 1px solid #16a34a40; }
.tag-ato { background: #dc262620; color: #f87171; border: 1px solid #dc262640; }
.tag-tp  { background: #ea580c20; color: #fb923c; border: 1px solid #ea580c40; }
/* 아웃코마 제품 태그 */
.tag-do  { background: #a78bfa20; color: #a78bfa; border: 1px solid #a78bfa40; }
.total-row td { background: #1c2128 !important; font-weight: 700; color: #f0f6fc; border-top: 1px solid #30363d; }
.sort-asc::after  { content: ' ↑'; }
.sort-desc::after { content: ' ↓'; }
.state-box { text-align: center; padding: 60px 20px; }
.spinner { width: 26px; height: 26px; border: 2px solid #21262d; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-label { font-size: 14px; color: #6e7681; }
.error-box { background: #f7816610; border: 1px solid #f7816630; border-radius: 8px; padding: 14px 18px; color: #f78166; font-size: 13px; margin: 16px; }

/* ── 소스 전환 탭 (메타 / 카페24) ── */
.source-tabs { display: flex; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 3px; gap: 2px; }
.source-tab {
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
  color: #6e7681; border: none; background: none; font-weight: 600; transition: all 0.15s;
}
.source-tab:hover { color: #c9d1d9; }
.source-tab.active.meta    { background: #388bfd20; color: #58a6ff; }
.source-tab.active.cafe24  { background: #f0883e20; color: #f0883e; }

/* ── 카페24 패널 ── */
#cafe24Panel { display: none; }
.c24-kpi-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.c24-kpi { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 140px; position: relative; overflow: hidden; }
.c24-kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--ac, #f0883e); }
.c24-kpi .kpi-label { font-size: 11px; color: #6e7681; letter-spacing: 0.05em; margin-bottom: 6px; }
.c24-kpi .kpi-value { font-size: 22px; font-weight: 700; color: #f0f6fc; }
.c24-date-info { font-size: 12px; color: #6e7681; margin-bottom: 14px; }
.c24-no-data { text-align: center; padding: 60px 20px; color: #6e7681; font-size: 14px; }
select option { background: #161b22; color: #c9d1d9; }

/* ── PASSWORD SCREEN ── */
#pwScreen {
  position: fixed; inset: 0; background: #0d1117;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 300;
}
.pw-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 36px;
}
.pw-logo { font-size: 13px; font-weight: 600; color: #4e5564; letter-spacing: 0.08em; text-transform: uppercase; }
.pw-logo em { color: #4ade80; font-style: normal; }
.pw-box {
  display: flex; flex-direction: column; gap: 10px; width: 300px;
}
.pw-input-row {
  display: flex; gap: 0; border: 1px solid #21262d; border-radius: 10px; overflow: hidden;
  transition: border-color 0.15s;
}
.pw-input-row:focus-within { border-color: #4ade80; }
.pw-input-row.error { border-color: #f78166; animation: shake 0.3s ease; }
#pwInput {
  flex: 1; background: #161b22; border: none;
  color: #f0f6fc; font-size: 14px; padding: 12px 16px; outline: none;
}
#pwInput::placeholder { color: #3d4451; }
.pw-btn {
  background: #4ade80; border: none; color: #0d1117; font-size: 13px; font-weight: 700;
  padding: 0 18px; cursor: pointer; transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
}
.pw-btn:hover { background: #86efac; }
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  25%{ transform: translateX(-5px); }
  75%{ transform: translateX(5px); }
}
.pw-error { font-size: 12px; color: #f78166; min-height: 16px; padding-left: 4px; }
/* ── 일별 뷰 ── */
.daily-header-row td { background: #1a2035 !important; font-weight: 700; color: #f0f6fc; border-top: 2px solid #30363d; padding: 10px 12px; }
.daily-sub-row td { background: #0d1117; color: #8b949e; font-size: 12.5px; padding: 6px 12px 6px 20px; border-bottom: 1px solid #161b22; }
.daily-sub-row td:first-child { color: #58a6ff; font-weight: 600; padding-left: 28px; }
.daily-sub-row:last-child td { border-bottom: 2px solid #21262d; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  /* 브랜드 선택 화면 */
  #brandScreen { gap: 20px; padding: 24px 16px; justify-content: flex-start; padding-top: 36px; }
  .brand-screen-title { font-size: 20px; }
  .brand-screen-sub { font-size: 12px; }
  .brand-cards { flex-direction: column; gap: 10px; width: 100%; }
  .brand-card { width: 100%; padding: 16px 18px; flex-direction: row; justify-content: flex-start; text-align: left; gap: 14px; }
  .brand-card-badge { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0; font-size: 18px; }
  .brand-card-name { font-size: 16px; }
  .brand-card-products { font-size: 11px; }

  /* 오늘 직접매출 카드 — 2열 */
  #todayProductSales { max-width: 100%; }
  #todayProductSales [style*="grid-template-columns:repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* 헤더 — 2줄 레이아웃 */
  header {
    height: auto; padding: 9px 14px; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .logo { width: 100%; font-size: 13px; gap: 8px; justify-content: space-between; }
  .header-right { width: 100%; justify-content: space-between; gap: 8px; }
  .last-updated { display: none; }
  .refresh-btn { padding: 5px 10px; font-size: 12px; }
  .refresh-btn span:last-child { display: none; }
  .source-tab { padding: 5px 11px; font-size: 12px; }

  /* 컨테이너 */
  .container { padding: 12px 10px; }
  .controls { gap: 7px; margin-bottom: 14px; }

  /* 탭 그룹 — 가로 스크롤, 줄바꿈 없음 */
  .ctrl-row { gap: 6px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
  .ctrl-row::-webkit-scrollbar { display: none; }
  .tab-group { flex-shrink: 0; }
  .tab-btn { padding: 5px 9px; font-size: 11px; flex-shrink: 0; }
  .date-range { flex-shrink: 0; padding: 4px 8px; }
  .date-range input[type="date"] { font-size: 11px; }
  .view-group, .level-group { flex-shrink: 0; }

  /* KPI — 2열 */
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
  .kpi-value { font-size: 15px; }
  .kpi-card { padding: 10px 12px; }

  /* 테이블 — 모바일 컬럼 숨김 (JS에서 mobile-hide 클래스 추가) */
  .table-section { border-radius: 8px; overflow: hidden; }
  .table-section > .table-header-row { padding: 10px 12px; }
  .table-title { font-size: 12px; }
  #tableContent, #c24TableContent { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: unset; width: 100%; }
  th { padding: 7px 8px; font-size: 10px; }
  td { padding: 6px 8px; font-size: 11px; white-space: nowrap; }
  .cell-name { max-width: 120px; font-size: 11px; }
  .cell-sub  { max-width: 80px;  font-size: 10px; }
  th.m-hide, td.m-hide { display: none; }

  /* 카페24 KPI */
  .c24-kpi-bar { gap: 7px; }
  .c24-kpi { padding: 10px 12px; min-width: 90px; }
  .c24-kpi .kpi-value { font-size: 16px; }

  /* 드릴다운 바 */
  #drilldownBar { font-size: 11px; padding: 6px 10px; flex-wrap: wrap; gap: 6px; }

  /* 일별 뷰 */
  .daily-header-row td { padding: 9px 8px; font-size: 11px; }
  .daily-sub-row td { font-size: 10px; padding: 5px 8px 5px 12px; }
  .daily-sub-row td:first-child { padding-left: 16px; }
}
</style>
</head>
<body>

<!-- ── 비밀번호 화면 ── -->
<div id="pwScreen">
  <div class="pw-wrap">
    <div class="pw-logo"><em>LOGGREEN</em> ADS DASHBOARD</div>
    <div class="pw-box">
      <div class="pw-input-row" id="pwRow">
        <input id="pwInput" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
        <button class="pw-btn" onclick="checkPw()">Enter</button>
      </div>
      <div class="pw-error" id="pwError"></div>
    </div>
  </div>
</div>

<!-- ── 브랜드 선택 화면 ── -->
<div id="brandScreen">
  <div class="brand-screen-logo"><em>로그린팀</em> 광고 대시보드</div>

  <!-- 오늘 제품별 직접매출 -->
  <div id="todayProductSales" style="width:100%;max-width:860px;display:none"></div>

  <!-- 브랜드 선택 -->
  <div style="text-align:center">
    <div class="brand-screen-title">브랜드를 선택하세요</div>
    <div class="brand-screen-sub">선택한 브랜드의 메타 광고 성과를 확인합니다</div>
  </div>
  <div class="brand-cards">
    <div class="brand-card ridermune" onclick="selectBrand('ridermune')">
      <div class="brand-card-badge">R</div>
      <div class="brand-card-name">리더뮨</div>
      <div class="brand-card-products">노즈픽션 · 템퍼픽션<br>아토픽션 · 노즈스파<br>키즈픽션</div>
    </div>
    <div class="brand-card outcoma" onclick="selectBrand('outcoma')">
      <div class="brand-card-badge">O</div>
      <div class="brand-card-name">아웃코마</div>
      <div class="brand-card-products">디오스톡</div>
    </div>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard">
<header>
  <div class="logo">
    <em>로그린팀</em> 광고 대시보드
    <span class="brand-badge-header" id="brandBadge" onclick="goToBrandSelect()">—</span>
  </div>
  <div class="header-right">
    <div class="source-tabs">
      <button class="source-tab meta active" onclick="setSource('meta')">메타</button>
      <button class="source-tab cafe24" onclick="setSource('cafe24')">카페24</button>
    </div>
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span id="refreshIcon">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="container">
  <!-- 컨트롤 -->
  <div class="controls">
    <div class="ctrl-row">
      <div class="tab-group date-group">
        <button class="tab-btn" data-preset="today"     onclick="setPreset(this)">오늘</button>
        <button class="tab-btn" data-preset="yesterday" onclick="setPreset(this)">어제</button>
        <button class="tab-btn active" data-preset="last_7d"  onclick="setPreset(this)">최근 7일</button>
        <button class="tab-btn" data-preset="last_14d"  onclick="setPreset(this)">최근 14일</button>
        <button class="tab-btn" data-preset="last_30d"  onclick="setPreset(this)">최근 30일</button>
      </div>
      <div class="date-range">
        <input type="date" id="startDate">
        <span class="sep">~</span>
        <input type="date" id="endDate">
        <button class="date-apply" onclick="applyCustomDate()">적용</button>
      </div>
    </div>
    <div class="ctrl-row">
      <div class="tab-group level-group">
        <button class="tab-btn active" data-level="campaign" onclick="setLevel(this)">캠페인별</button>
        <button class="tab-btn"        data-level="ad"       onclick="setLevel(this)">소재별</button>
      </div>
      <div class="tab-group view-group" style="margin-left:8px;">
        <button class="tab-btn active" data-view="summary" onclick="setViewMode(this)">기간 합산</button>
        <button class="tab-btn"        data-view="daily"   onclick="setViewMode(this)">일별로 보기</button>
      </div>
      <div class="tab-group product-group" id="productTabs"></div>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card spend">  <div class="kpi-label">총 소진금액</div>   <div class="kpi-value" id="kpi-spend">—</div>       <div class="kpi-sub" id="kpi-spend-sub"></div></div>
    <div class="kpi-card purch">  <div class="kpi-label">구매 수</div>       <div class="kpi-value" id="kpi-purchases">—</div>   <div class="kpi-sub" id="kpi-purch-sub"></div></div>

function fmtKRW(n) { return Math.round(n).toLocaleString("ko-KR"); }

function fmtS(n) {  // 모바일용 숫자 축약

}

async function fetchInsightsLevel(level) {
  const brand  = BRANDS[currentBrand];
  const isAd   = level === "ad";
  const fields = isAd
    ? "ad_name,adset_name,campaign_name,spend,impressions,clicks,ctr,cpc,actions,purchase_roas"
    : "campaign_name,spend,impressions,clicks,ctr,cpc,actions,purchase_roas";

  const url = new URL(`https://graph.facebook.com/v21.0/${brand.accountId}/insights`);
  url.searchParams.set("access_token", TOKEN);
  url.searchParams.set("fields", fields);
  url.searchParams.set("level", level);
  url.searchParams.set("limit", "500");

  if (dateConfig.preset) {
    url.searchParams.set("date_preset", dateConfig.preset);
  } else {
    url.searchParams.set("time_range", JSON.stringify({ since: dateConfig.since, until: dateConfig.until }));
  }

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error.message);

  let rows = json.data || [];
  let next = json.paging?.next;
  while (next) {
    const r = await fetch(next);
    const j = await r.json();
    rows = rows.concat(j.data || []);
    next = j.paging?.next;
  }

  return rows.flatMap(c => {
    const campName = c.campaign_name || "";
    const product  = classify(campName);
    if (!product) return [];

    const spend   = parseFloat(c.spend || 0);
    const purchases = parseInt((c.actions || []).find(a => a.action_type === "purchase")?.value || 0);
    const roas    = parseFloat((c.purchase_roas || [])[0]?.value || 0);
    const clicks  = parseInt(c.clicks || 0);

    return [{
      name:        isAd ? (c.ad_name || "—") : campName,
      parent:      isAd ? campName : "",
      product,
      spend,
      purchases,
      roas,
      cpa:     purchases > 0 ? spend / purchases : 0,
      cpc_val: parseFloat(c.cpc || 0) || (clicks > 0 ? spend / clicks : 0),
      revenue: spend * roas,
      cvr:     clicks > 0 ? purchases / clicks * 100 : 0,
      impressions: parseInt(c.impressions || 0),
      clicks,
      ctr: parseFloat(c.ctr || 0),
    }];
  });
}

async function fetchInsightsDaily(level) {

    ? "ad_name,campaign_name,spend,impressions,clicks,ctr,cpc,actions,purchase_roas,date_start"

  url.searchParams.set("fields", fields);
  url.searchParams.set("level", level);
  url.searchParams.set("limit", "500");
  url.searchParams.set("time_increment", "1");

  const MAX_DAYS = 20;
  if (dateConfig.preset === "last_30d") {
    const until = new Date().toISOString().slice(0, 10);
    const since = new Date(Date.now() - (MAX_DAYS - 1) * 86400000).toISOString().slice(0, 10);
    url.searchParams.set("time_range", JSON.stringify({ since, until }));
  } else if (dateConfig.preset) {
    url.searchParams.set("date_preset", dateConfig.preset);
  } else if (dateConfig.since && dateConfig.until) {
    const sinceD = new Date(dateConfig.since);
    const untilD = new Date(dateConfig.until);
    const diff = Math.round((untilD - sinceD) / 86400000) + 1;
    const since = diff > MAX_DAYS
      ? new Date(untilD - (MAX_DAYS - 1) * 86400000).toISOString().slice(0, 10)
      : dateConfig.since;
    url.searchParams.set("time_range", JSON.stringify({ since, until: dateConfig.until }));
  }

  const res = await fetch(url.toString());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error.message);

  let rows = json.data || [];
  let next = json.paging?.next;
  while (next) {
    const r = await fetch(next);
    const j = await r.json();
    rows = rows.concat(j.data || []);
    next = j.paging?.next;
  }

  return rows.flatMap(c => {
    const campName = c.campaign_name || "";
    const product  = classify(campName);
    if (!product) return [];
    const spend = parseFloat(c.spend || 0);
    const purchases = parseInt((c.actions || []).find(a => a.action_type === "purchase")?.value || 0);
    const roas  = parseFloat((c.purchase_roas || [])[0]?.value || 0);
    const clicks = parseInt(c.clicks || 0);
    return [{
      name:    isAd ? (c.ad_name || "—") : campName,
      parent:  isAd ? campName : "",
      product, spend, purchases, roas,
      cpa:     purchases > 0 ? spend / purchases : 0,
      cpc_val: parseFloat(c.cpc || 0) || (clicks > 0 ? spend / clicks : 0),
      revenue: spend * roas,
      cvr:     clicks > 0 ? purchases / clicks * 100 : 0,
      impressions: parseInt(c.impressions || 0),
      clicks, ctr: parseFloat(c.ctr || 0),
      date: c.date_start || "",
    }];
  });
}

function render() {
  const data = filtered();
  let tSpend = 0, tPurch = 0, tImpr = 0, tClick = 0, tWRoas = 0;
  data.forEach(c => { tSpend += c.spend; tPurch += c.purchases; tImpr += c.impressions; tClick += c.clicks; tWRoas += c.roas * c.spend; });
  const avgRoas = tSpend > 0 ? tWRoas / tSpend : 0;
  const cpp     = tPurch > 0 ? tSpend / tPurch : 0;
  const ctr     = tImpr  > 0 ? (tClick / tImpr * 100) : 0;

  document.getElementById("kpi-spend").textContent        = fmtKRW(tSpend);
  document.getElementById("kpi-spend-sub").textContent    = data.length + "개 " + (currentLevel === "ad" ? "소재" : "캠페인");

  document.getElementById("kpi-roas").textContent         = (avgRoas * 100).toFixed(0) + "%";
  document.getElementById("kpi-roas").className           = "kpi-value " + roasCls(avgRoas);
  document.getElementById("kpi-roas-sub").textContent     = avgRoas >= 1 ? "광고비 회수 중" : "⚠ 광고비 미회수";
  document.getElementById("kpi-cpp").textContent          = cpp > 0 ? fmtKRW(cpp) : "—";
  document.getElementById("kpi-cpp-sub").textContent      = "구매 " + tPurch + "건 기준";
  document.getElementById("kpi-impressions").textContent  = fmtNum(tImpr);
  document.getElementById("kpi-impr-sub").textContent     = "CTR " + ctr.toFixed(2) + "%";
  document.getElementById("kpi-clicks").textContent       = fmtNum(tClick);
  document.getElementById("kpi-clicks-sub").textContent   = "CTR " + ctr.toFixed(2) + "%";

  document.getElementById("tableTitle").textContent = currentLevel === "ad" ? "소재 상세" : "캠페인 상세";
  if (viewMode === "daily") renderDailyTable(data);
  else renderTable(data);
}

      const k = normKey(r[nameKey] || "");
      result[dateKey][k] = (result[dateKey][k] || 0) + parseInt(r.order_amount || 0);

}

      tSpend += r.spend; tPurch += r.purchases;
      tRoasW += r.roas * r.spend; tClick += r.clicks; tImpr += r.impressions;
      const dv = lookupDirectSales(r.name, isAd, dsMapByDate[r.date] || {});
      if (dv != null) tDirect += dv;
    });
    const tRoas = tSpend > 0 ? tRoasW / tSpend : 0;
    return { ...g, tSpend, tPurch, tRoas, tClick, tImpr, tDirect,
      tCpa: tPurch > 0 ? tSpend / tPurch : 0,
      tRevenue: tSpend * tRoas,
      tCtr: tImpr > 0 ? tClick / tImpr * 100 : 0,
      tCvr: tClick > 0 ? tPurch / tClick * 100 : 0,
      tCpc: tClick > 0 ? tSpend / tClick : 0,
    };
  }).sort((a, b) => b.tSpend - a.tSpend);

  // 제품 필터
  const filtered = currentProd === "all" ? groupList : groupList.filter(g => g.product.id === currentProd);
  document.getElementById("tableMeta").textContent = filtered.length + "개";

  let html = `<table><thead><tr>`;
  if (isAd) {
    html += `<th>소재명</th><th class="${mh.trim()}">캠페인</th><th>CPA</th><th>광고비</th><th>ROAS</th><th class="${mh.trim()}">매출</th>`;
    if (hasDirect) html += `<th>직접ROAS</th><th>직접값</th>`;
    html += `<th class="${mh.trim()}">구매수</th><th class="${mh.trim()}">CPC</th><th class="${mh.trim()}">CTR</th><th class="${mh.trim()}">CVR</th><th class="${mh.trim()}">제품</th>`;
  } else {
    html += `<th>캠페인명</th><th class="${mh.trim()}">제품</th><th>CPA</th><th>광고비</th><th>ROAS</th><th class="${mh.trim()}">매출</th>`;
    if (hasDirect) html += `<th>직접ROAS</th><th>직접값</th>`;
    html += `<th class="${mh.trim()}">구매수</th><th class="${mh.trim()}">CPC</th><th class="${mh.trim()}">CTR</th><th class="${mh.trim()}">CVR</th>`;
  }
  html += `</tr></thead><tbody>`;

  filtered.forEach(g => {
    const tRoasPct = g.tRoas > 0 ? (g.tRoas * 100).toFixed(0) + "%" : "—";
    const tDR = (g.tDirect > 0 && g.tSpend > 0) ? g.tDirect / g.tSpend : null;
    const tDirectCell = hasDirect
      ? `<td class="${tDR != null ? roasCls(tDR) : ''}">${tDR != null ? (tDR * 100).toFixed(0) + "%" : "—"}</td><td style="color:${g.tDirect > 0 ? "#f0883e" : "#4e5564"}">${g.tDirect > 0 ? fmtKRW(g.tDirect) : "—"}</td>`
      : "";

    // 헤더 행
    const escapedName = g.name.replace(/'/g, "\\'");
    if (isAd) {
      html += `<tr class="daily-header-row">
        <td title="${g.name}"><b>${g.name}</b></td><td class="cell-sub${mh}">${g.parent}</td>
        <td>${g.tCpa > 0 ? fmtKRW(g.tCpa) : "—"}</td><td><b>${fmtKRW(g.tSpend)}</b></td>
        <td class="${roasCls(g.tRoas)}"><b>${tRoasPct}</b></td><td class="${mh.trim()}">${g.tRevenue > 0 ? fmtKRW(g.tRevenue) : "—"}</td>
        ${tDirectCell}
        <td class="${mh.trim()}">${g.tPurch > 0 ? g.tPurch.toLocaleString() : "—"}</td>
        <td class="${mh.trim()}">${g.tCpc > 0 ? fmtKRW(g.tCpc) : "—"}</td><td class="${mh.trim()}">${g.tCtr.toFixed(2)}%</td>
        <td class="${mh.trim()}">${g.tCvr > 0 ? g.tCvr.toFixed(2) + "%" : "—"}</td>
        <td class="${mh.trim()}"><span class="tag tag-${g.product.id}">${g.product.label}</span></td></tr>`;
    } else {
      html += `<tr class="daily-header-row">
        <td title="${g.name}" style="cursor:pointer;" onclick="drillDown('${escapedName}')">
          <span style="color:#58a6ff;text-decoration:underline dotted;"><b>${g.name}</b></span>
          <span style="font-size:10px;color:#4e5564;margin-left:4px;">▶</span>
        </td>
        <td class="${mh.trim()}"><span class="tag tag-${g.product.id}">${g.product.label}</span></td>
        <td>${g.tCpa > 0 ? fmtKRW(g.tCpa) : "—"}</td><td><b>${fmtKRW(g.tSpend)}</b></td>
        <td class="${roasCls(g.tRoas)}"><b>${tRoasPct}</b></td><td class="${mh.trim()}">${g.tRevenue > 0 ? fmtKRW(g.tRevenue) : "—"}</td>
        ${tDirectCell}
        <td class="${mh.trim()}">${g.tPurch > 0 ? g.tPurch.toLocaleString() : "—"}</td>
        <td class="${mh.trim()}">${g.tCpc > 0 ? fmtKRW(g.tCpc) : "—"}</td><td class="${mh.trim()}">${g.tCtr.toFixed(2)}%</td>
        <td class="${mh.trim()}">${g.tCvr > 0 ? g.tCvr.toFixed(2) + "%" : "—"}</td></tr>`;
    }

    // 날짜별 서브 행
    g.rows.forEach(r => {
      const roasPct = r.roas > 0 ? (r.roas * 100).toFixed(0) + "%" : "—";
      const dv = lookupDirectSales(r.name, isAd, dsMapByDate[r.date] || {});
      const dr = (dv != null && r.spend > 0) ? dv / r.spend : null;
      const dCell = hasDirect
        ? `<td class="${dr != null ? roasCls(dr) : ''}" style="${dr == null ? "color:#4e5564" : ""}">${dr != null ? (dr * 100).toFixed(0) + "%" : "—"}</td><td style="color:${dv != null ? "#f0883e" : "#4e5564"}">${dv != null ? fmtKRW(dv) : "—"}</td>`
        : "";
      if (isAd) {
        html += `<tr class="daily-sub-row">
          <td>${r.date}</td><td class="${mh.trim()}">—</td>

          <td class="${roasCls(r.roas)}">${roasPct}</td><td class="${mh.trim()}">${r.revenue > 0 ? fmtKRW(r.revenue) : "—"}</td>
          ${dCell}
          <td class="${mh.trim()}">${r.purchases > 0 ? r.purchases.toLocaleString() : "—"}</td>
          <td class="${mh.trim()}">${r.cpc_val > 0 ? fmtKRW(r.cpc_val) : "—"}</td>

  html += "</tbody></table>";
  document.getElementById("tableContent").innerHTML = html;
}

function renderTable(data) {
  const sorted = [...data].sort((a, b) => {
    const av = a[sortKey] ?? 0, bv = b[sortKey] ?? 0;
    return sortDir * (typeof av === "string" ? av.localeCompare(bv) : av - bv);
  });
  document.getElementById("tableMeta").textContent = sorted.length + "개";

  const col = (key, label) => {
    const cls = sortKey === key ? (sortDir === 1 ? "sort-asc" : "sort-desc") : "";
    return `<th class="${cls}" onclick="sortBy('${key}')">${label}</th>`;
  };
  const isAd = currentLevel === "ad";

  // 직접값 매출 맵 빌드 (Cafe24 히스토리 기반)
  const dsMap = buildDirectSalesMap(isAd);
  const hasDirect = Object.keys(dsMap).length > 0;

  const mob = isMobile();
  const H = (key, label, hide) => {
    const cls = (sortKey === key ? (sortDir === 1 ? "sort-asc" : "sort-desc") : "") + (hide ? " m-hide" : "");
    return `<th class="${cls.trim()}" onclick="sortBy('${key}')">${label}</th>`;
  };

  let html = `<table><thead><tr>`;
  if (isAd) {
    html += `${H("name","소재명")}${H("parent","캠페인",mob)}${H("cpa","CPA")}${H("spend","광고비")}${H("roas","ROAS")}${H("revenue","매출",mob)}`;
    if (hasDirect) html += `<th>직접ROAS</th><th>직접값</th>`;
    html += `${H("purchases","구매수",mob)}${H("cpc_val","CPC",mob)}${H("ctr","CTR",mob)}${H("cvr","CVR",mob)}<th class="${mob?'m-hide':''}">제품</th>`;
  } else {
    html += `${H("name","캠페인명")}<th class="${mob?'m-hide':''}">제품</th>${H("cpa","CPA")}${H("spend","광고비")}${H("roas","ROAS")}${H("revenue","매출",mob)}`;
    if (hasDirect) html += `<th>직접ROAS</th><th>직접값</th>`;
    html += `${H("purchases","구매수",mob)}${H("cpc_val","CPC",mob)}${H("ctr","CTR",mob)}${H("cvr","CVR",mob)}`;
  }
  html += `</tr></thead><tbody>`;

  let tSpend = 0, tPurch = 0, tImpr = 0, tClick = 0, tWRoas = 0, tRevenue = 0, tDirect = 0;
  sorted.forEach(c => {
    tSpend   += c.spend; tPurch   += c.purchases; tImpr    += c.impressions;
    tClick   += c.clicks; tWRoas   += c.roas * c.spend; tRevenue += c.revenue;
    const roasPct = c.roas > 0 ? (c.roas * 100).toFixed(0) + "%" : "—";
    const cvrFmt  = c.cvr  > 0 ? c.cvr.toFixed(2) + "%" : "—";
    const cpcFmt  = c.cpc_val > 0 ? fmtKRW(c.cpc_val) : "—";
    const directVal = lookupDirectSales(c.name, isAd, dsMap);
    if (directVal != null) tDirect += directVal;
    const directRoas = (directVal != null && c.spend > 0) ? directVal / c.spend : null;
    const directRoasPct = directRoas != null ? (directRoas * 100).toFixed(0) + "%" : "—";
    const directCell = hasDirect
      ? `<td class="${directRoas != null ? roasCls(directRoas) : ''}" style="${directRoas == null ? 'color:#4e5564' : ''}">${directRoasPct}</td><td style="color:${directVal != null ? '#f0883e' : '#4e5564'}">${directVal != null ? (mob?fmtS(directVal):fmtKRW(directVal)) : "—"}</td>`
      : "";
    const fN = mob ? fmtS : fmtKRW;

    if (isAd) {
      html += `<tr>
        <td class="cell-name" title="${c.name}">${c.name}</td>
        <td class="cell-sub m-hide" title="${c.parent}">${c.parent}</td>
        <td>${c.cpa > 0 ? fmtKRW(c.cpa) : "—"}</td>
        <td>${fN(c.spend)}</td>
        <td class="${roasCls(c.roas)}">${roasPct}</td>
        <td class="m-hide">${c.revenue > 0 ? fmtKRW(c.revenue) : "—"}</td>
        ${directCell}
        <td class="m-hide">${c.purchases > 0 ? c.purchases.toLocaleString() : "—"}</td>
        <td class="m-hide">${cpcFmt}</td>
        <td class="m-hide">${c.ctr.toFixed(2)}%</td>
        <td class="m-hide">${cvrFmt}</td>
        <td class="m-hide"><span class="tag tag-${c.product.id}">${c.product.label}</span></td>
      </tr>`;
    } else {
      const escapedName = c.name.replace(/'/g, "\\'");
      html += `<tr>
        <td class="cell-name" title="${c.name}" style="cursor:pointer;" onclick="drillDown('${escapedName}')">
          <span style="color:#58a6ff;text-decoration:underline dotted;">${c.name}</span>
          <span style="font-size:10px;color:#4e5564;margin-left:4px;">▶</span>
        </td>
        <td class="m-hide"><span class="tag tag-${c.product.id}">${c.product.label}</span></td>
        <td>${c.cpa > 0 ? fmtKRW(c.cpa) : "—"}</td>
        <td>${fN(c.spend)}</td>
        <td class="${roasCls(c.roas)}">${roasPct}</td>
        <td class="m-hide">${c.revenue > 0 ? fmtKRW(c.revenue) : "—"}</td>
        ${directCell}
        <td class="m-hide">${c.purchases > 0 ? c.purchases.toLocaleString() : "—"}</td>
        <td class="m-hide">${cpcFmt}</td>
        <td class="m-hide">${c.ctr.toFixed(2)}%</td>
        <td class="m-hide">${c.cvr > 0 ? c.cvr.toFixed(2) + "%" : "—"}</td>
      </tr>`;
    }
  });

  const tRoas = tSpend > 0 ? tWRoas / tSpend : 0;
  const tCpa  = tPurch > 0 ? tSpend / tPurch : 0;
  const tCpc  = tClick > 0 ? tSpend / tClick : 0;
  const tCtr  = tImpr  > 0 ? (tClick / tImpr * 100) : 0;
  const tCvr  = tClick > 0 ? (tPurch / tClick * 100) : 0;
  const tRoasPct = (tRoas * 100).toFixed(0) + "%";
  const tDirectRoas = (tDirect > 0 && tSpend > 0) ? tDirect / tSpend : null;
  const tDirectRoasPct = tDirectRoas != null ? (tDirectRoas * 100).toFixed(0) + "%" : "—";
  const totalDirectCell = hasDirect
    ? `<td class="${tDirectRoas != null ? roasCls(tDirectRoas) : ''}">${tDirectRoasPct}</td><td style="color:#f0883e">${tDirect > 0 ? fmtKRW(tDirect) : "—"}</td>`
    : "";

  if (isAd) {
    html += `<tr class="total-row"><td>합계 (${sorted.length}개)</td><td class="m-hide">—</td><td>${tCpa > 0 ? fmtKRW(tCpa) : "—"}</td><td>${fmtKRW(tSpend)}</td><td class="${roasCls(tRoas)}">${tRoasPct}</td><td class="m-hide">${fmtKRW(tRevenue)}</td>${totalDirectCell}<td class="m-hide">${tPurch.toLocaleString()}</td><td class="m-hide">${tCpc > 0 ? fmtKRW(tCpc) : "—"}</td><td class="m-hide">${tCtr.toFixed(2)}%</td><td class="m-hide">${tCvr.toFixed(2)}%</td><td class="m-hide">—</td></tr>`;
  } else {
    html += `<tr class="total-row"><td>합계 (${sorted.length}개)</td><td class="m-hide">—</td><td>${tCpa > 0 ? fmtKRW(tCpa) : "—"}</td><td>${fmtKRW(tSpend)}</td><td class="${roasCls(tRoas)}">${tRoasPct}</td><td class="m-hide">${fmtKRW(tRevenue)}</td>${totalDirectCell}<td class="m-hide">${tPurch.toLocaleString()}</td><td class="m-hide">${tCpc > 0 ? fmtKRW(tCpc) : "—"}</td><td class="m-hide">${tCtr.toFixed(2)}%</td><td class="m-hide">${tCvr.toFixed(2)}%</td></tr>`;
  }
  html += "</tbody></table>";
  document.getElementById("tableContent").innerHTML = html;
}

// ── Cafe24 히스토리 헬퍼 ──
function c24AvailDates() {
  const h = window.CAFE24_HISTORY;
  if (!h) return [];
  return Object.keys(h).sort().reverse();
}

function buildC24DateSelects() {
  const dates = c24AvailDates();
  const sel = document.getElementById("c24DateSelect");
  const endSel = document.getElementById("c24DateEnd");
  if (!sel || !endSel) return;

  if (!dates.length) {
    sel.innerHTML = '<option value="">데이터 없음</option>';
    endSel.innerHTML = '<option value="same">동일</option>';
    return;
  }

  sel.innerHTML = dates.map(d => `<option value="${d}"${d === c24DateFrom ? " selected" : ""}>${d}</option>`).join("");
  endSel.innerHTML = '<option value="same">동일</option>' +
    dates.map(d => `<option value="${d}"${d === c24DateTo ? " selected" : ""}>${d}</option>`).join("");

  if (!c24DateFrom) c24DateFrom = dates[0];
}

function setC24Date(v) {
  c24DateFrom = v;
  if (c24DateTo && c24DateTo > c24DateFrom) c24DateTo = null;
  renderC24();
}

function setC24DateEnd(v) {
  c24DateTo = (v === "same") ? null : v;
  renderC24();
}

// 지정 날짜 범위의 rows 집계 (합산)
function c24AggRows(view) {
  const h = window.CAFE24_HISTORY;
  if (!h || !currentBrand) return [];
  const dates = c24AvailDates();
  const from = c24DateFrom || (dates[0] || "");
  const to   = c24DateTo   || from;
  const range = dates.filter(d => d >= to && d <= from); // dates is desc

  const nameKey = view === "campaigns" ? "campaign" : view === "contents" ? "term" : "channel";
  const agg = {};

  range.forEach(dateKey => {
    const bd = h[dateKey]?.[currentBrand];
    if (!bd) return;
    const rows = bd[view] || [];
    rows.forEach(r => {
      const k = r[nameKey] || "";
      if (!agg[k]) agg[k] = { [nameKey]: k, order_amount: 0, order_count: 0, inflow_count: 0 };
      agg[k].order_amount  += parseInt(r.order_amount  || 0);
      agg[k].order_count   += parseInt(r.order_count   || 0);
      agg[k].inflow_count  += parseInt(r.inflow_count  || 0);
    });
  });

  return Object.values(agg).map(r => ({
    ...r,
    purchase_rate:          r.inflow_count > 0 ? (r.order_count / r.inflow_count * 100).toFixed(2) : "0",
    order_amount_per_order: r.order_count  > 0 ? Math.round(r.order_amount / r.order_count) : 0,
    order_amount_per_inflow: r.inflow_count > 0 ? Math.round(r.order_amount / r.inflow_count) : 0,
  }));
}

// ── 직접값 매출 (Meta 테이블 용) ──
function normKey(s) {
  return s ? s.trim().normalize('NFC') : '';
}

function getC24DatesForMetaRange() {
  const dates = c24AvailDates();
  if (!dates.length) return [];
  const todayStr     = new Date().toISOString().slice(0, 10);
  const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (dateConfig.preset === "today")     return dates.filter(d => d === todayStr);
  if (dateConfig.preset === "yesterday") return dates.filter(d => d === yesterdayStr);
  if (dateConfig.preset === "last_7d")  return dates.slice(0, 7);
  if (dateConfig.preset === "last_14d") return dates.slice(0, 14);
  if (dateConfig.preset === "last_30d") return dates.slice(0, 30);
  if (dateConfig.since && dateConfig.until)
    return dates.filter(d => d >= dateConfig.since && d <= dateConfig.until);
  return dates.filter(d => d === todayStr);
}

function buildDirectSalesMap(isAd) {
  const h = window.CAFE24_HISTORY;
  if (!h || !currentBrand) return {};
  const range = getC24DatesForMetaRange();
  const key = isAd ? "contents" : "campaigns";
  const nameKey = isAd ? "term" : "campaign";
  const totals = {};

  range.forEach(dateKey => {
    const bd = h[dateKey]?.[currentBrand];
    if (!bd) return;
    (bd[key] || []).forEach(r => {
      const k = normKey(r[nameKey] || "");
      totals[k] = (totals[k] || 0) + parseInt(r.order_amount || 0);
    });
  });
  return totals;
}

function lookupDirectSales(metaName, isAd, dsMap) {
  if (!dsMap || !Object.keys(dsMap).length) return null;
  const nm = normKey(metaName);
  if (isAd) {
    // 1. 정확 매칭
    if (dsMap[nm] != null) return dsMap[nm];

    // 2. Cafe24 term이 Meta ad_name을 포함 (예: "01_260115_..." ⊇ "260115_...")
    for (const [k, v] of Object.entries(dsMap)) {
      if (k && k.includes(nm)) return v;
    }

    // 3. Meta ad_name이 Cafe24 term을 포함 (반대 방향, 짧은 키 오매칭 방지 위해 6자 이상만)
    for (const [k, v] of Object.entries(dsMap)) {
      if (k && k.length >= 6 && nm.includes(k)) return v;
    }

    // 4. 앞 숫자+언더바 prefix 제거 후 매칭 ("01_260115_..." → "260115_...")
    const stripPfx = s => s.replace(/^\d+_/, "");
    const metaS = stripPfx(nm);
    for (const [k, v] of Object.entries(dsMap)) {
      if (k && stripPfx(k) === metaS) return v;
    }

    console.warn(`[직접값 미매핑] Meta: "${nm}" | C24 샘플:`, Object.keys(dsMap).slice(0, 3));
    return null;
  } else {
    // 캠페인: Cafe24 UTM campaign 값이 Meta 캠페인명에 포함
    for (const [k, v] of Object.entries(dsMap)) {
      if (k && nm.toLowerCase().includes(k.toLowerCase())) return v;
    }
    return null;
  }
}

// ── 카페24 데이터 렌더링 ──
function setC24View(btn) {
  document.querySelectorAll("#c24ViewTabs .tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  c24View = btn.dataset.c24view;
  c24SortKey = "order_amount";
  c24SortDir = -1;
  renderC24();
}

function c24SortBy(key) {
  c24SortDir = c24SortKey === key ? c24SortDir * -1 : -1;
  c24SortKey = key;
  renderC24();
}

let c24ProdSortKey = "order_amount";
let c24ProdSortDir = -1;

function c24ProductType(name) {
  const nm = (name || '').toLowerCase();
  if (nm.includes('키즈픽션') || nm.includes('kidfiction')) return '키즈픽션';
  if (nm.includes('노즈픽션')) return '노즈픽션';
  if (nm.includes('템퍼픽션')) return '템퍼픽션';
  if (nm.includes('아토픽션')) return '아토픽션';
  if (nm.includes('노즈스파')) return '노즈스파';
  if (nm.includes('노즈브리즈')) return '노즈브리즈';
  if (nm.includes('슬로우픽션')) return '슬로우픽션';
  if (nm.includes('키로메디')) return '키로메디';
  if (nm.includes('바이오턴')) return '바이오턴';
  if (nm.includes('디오스톡')) return '디오스톡';
  return '기타';
}

function c24ProductRows() {
  const h = window.CAFE24_HISTORY;
  if (!h || !currentBrand) return [];
  const dates = c24AvailDates();
  const from = c24DateFrom || (dates[0] || "");
  const to   = c24DateTo   || from;
  const range = dates.filter(d => d >= to && d <= from);
  const map = {};
  range.forEach(d => {
    const bd = h[d]?.[currentBrand];
    if (!bd?.products) return;
    bd.products.forEach(p => {
      const key = p.product_no;
      if (!map[key]) map[key] = { product_no: p.product_no, product_name: p.product_name, order_count: 0, order_amount: 0, cart_count: 0, exposure_count: 0 };
      map[key].order_count    += parseInt(p.order_count    || 0);
      map[key].order_amount   += parseInt(p.order_amount   || 0);
      map[key].cart_count     += parseInt(p.cart_count     || 0);
      map[key].exposure_count += parseInt(p.exposure_count || 0);
    });
  });
  return Object.values(map);
}

function renderC24Products() {
  buildC24DateSelects();
  const dates = c24AvailDates();
  if (!dates.length) {
    document.getElementById("c24TableContent").innerHTML = `<div class="c24-no-data">cafe24_history.js 파일이 없습니다.<br>매일 09:00 자동 수집됩니다.</div>`;
    document.getElementById("c24KpiBar").innerHTML = "";
    return;
  }
  const from = c24DateFrom || (dates[0] || "");
  const to   = c24DateTo   || from;
  const dateLabel = from === to ? from : `${to} ~ ${from}`;

  const rows = c24ProductRows().filter(p => p.order_amount > 0);
  const sorted = [...rows].sort((a, b) => c24ProdSortDir * (parseFloat(a[c24ProdSortKey] ?? 0) - parseFloat(b[c24ProdSortKey] ?? 0)));

  let tSales = 0, tOrders = 0;
  rows.forEach(r => { tSales += r.order_amount; tOrders += r.order_count; });

  document.getElementById("c24KpiBar").innerHTML = `
    <div class="c24-kpi" style="--ac:#f0883e"><div class="kpi-label">총 매출</div><div class="kpi-value">${fmtKRW(tSales)}</div></div>
    <div class="c24-kpi" style="--ac:#3fb950"><div class="kpi-label">주문수</div><div class="kpi-value">${tOrders.toLocaleString()}건</div></div>
    <div class="c24-kpi" style="--ac:#e3b341"><div class="kpi-label">객단가</div><div class="kpi-value">${tOrders > 0 ? fmtKRW(Math.round(tSales / tOrders)) : "—"}</div></div>
  `;

  const mobP = isMobile();
  const colP = (key, label, hide) => {
    const sortCls = c24ProdSortKey === key ? (c24ProdSortDir === 1 ? "sort-asc" : "sort-desc") : "";
    const cls = [sortCls, hide ? "m-hide" : ""].filter(Boolean).join(" ");
    return `<th class="${cls}" onclick="c24ProdSortBy('${key}')">${label}</th>`;
  };

  const TYPE_COLORS = { '노즈픽션':'#34d399','키즈픽션':'#38bdf8','템퍼픽션':'#fb923c','아토픽션':'#f87171','노즈스파':'#86efac','노즈브리즈':'#a3e635','슬로우픽션':'#e879f9','키로메디':'#fbbf24','바이오턴':'#60a5fa','디오스톡':'#a78bfa','기타':'#6e7681' };

  let html = `<table><thead><tr>
    ${colP("product_name","상품명")}
    <th>구분</th>
    ${colP("order_amount","주문금액")}
    ${colP("order_count","주문수",mobP)}
    ${colP("cart_count","장바구니",mobP)}
    ${colP("exposure_count","노출수",mobP)}
  </tr></thead><tbody>`;

  let tS = 0, tO = 0;
  sorted.forEach(r => {
    tS += r.order_amount; tO += r.order_count;
    const ptype = c24ProductType(r.product_name);
    const color = TYPE_COLORS[ptype] || '#6e7681';
    const cleanName = (r.product_name || '').replace(/[🔒🔑🌕]/g, '').replace(/\[.*?\]/g, '').replace(/시크릿 할인페이지/g, '').trim();
    const mhP = mobP ? ' m-hide' : '';
    html += `<tr>
      <td class="cell-name" title="${r.product_name}">${cleanName}</td>
      <td><span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${color}22;color:${color};font-weight:600">${ptype}</span></td>
      <td>${fmtKRW(r.order_amount)}</td>
      <td class="${mhP.trim()}">${r.order_count.toLocaleString()}</td>
      <td class="${mhP.trim()}">${r.cart_count.toLocaleString()}</td>
      <td class="${mhP.trim()}">${r.exposure_count.toLocaleString()}</td>
    </tr>`;
  });
  html += `<tr class="total-row"><td>합계 (${sorted.length}개)</td><td>—</td><td>${fmtKRW(tS)}</td><td class="${mobP?'m-hide':''}">${tO.toLocaleString()}</td><td class="${mobP?'m-hide':''}">—</td><td class="${mobP?'m-hide':''}">—</td></tr>`;
  html += "</tbody></table>";

  document.getElementById("c24TableContent").innerHTML = html;
  document.getElementById("c24TableTitle").textContent = `카페24 상품별 (${dateLabel})`;
  document.getElementById("c24TableMeta").textContent  = `${sorted.length}개`;
}

function c24ProdSortBy(key) {
  c24ProdSortDir = c24ProdSortKey === key ? c24ProdSortDir * -1 : -1;
  c24ProdSortKey = key;
  renderC24Products();
}

function renderC24() {
  if (c24View === "products") { renderC24Products(); return; }
  buildC24DateSelects();

  const nameKey   = c24View === "campaigns" ? "campaign" : c24View === "contents" ? "term" : "channel";
  const nameLabel = c24View === "campaigns" ? "캠페인명" : c24View === "contents" ? "소재명" : "채널";

  const rows = c24AggRows(c24View);
  const dates = c24AvailDates();

  if (!dates.length) {
    document.getElementById("c24TableContent").innerHTML =
      `<div class="c24-no-data">cafe24_history.js 파일이 없습니다.<br>매일 09:00 자동 수집됩니다.</div>`;
    document.getElementById("c24KpiBar").innerHTML = "";
    return;
  }

  const from = c24DateFrom || (dates[0] || "");
  const to   = c24DateTo   || from;
  const dateLabel = from === to ? from : `${to} ~ ${from}`;

  // KPI
  let tSales = 0, tOrders = 0, tInflow = 0;
  rows.forEach(r => {
    tSales  += parseInt(r.order_amount  || 0);
    tOrders += parseInt(r.order_count   || 0);
    tInflow += parseInt(r.inflow_count  || 0);
  });
  const avgCvr = tInflow > 0 ? (tOrders / tInflow * 100).toFixed(2) : "—";
  const avgAov = tOrders > 0 ? Math.round(tSales / tOrders) : 0;

  document.getElementById("c24KpiBar").innerHTML = `
    <div class="c24-kpi" style="--ac:#f0883e"><div class="kpi-label">총 매출</div><div class="kpi-value">${fmtKRW(tSales)}</div></div>
    <div class="c24-kpi" style="--ac:#3fb950"><div class="kpi-label">구매수</div><div class="kpi-value">${tOrders.toLocaleString()}건</div></div>
    <div class="c24-kpi" style="--ac:#58a6ff"><div class="kpi-label">유입수</div><div class="kpi-value">${tInflow.toLocaleString()}</div></div>
    <div class="c24-kpi" style="--ac:#a371f7"><div class="kpi-label">구매율</div><div class="kpi-value">${avgCvr}%</div></div>
    <div class="c24-kpi" style="--ac:#e3b341"><div class="kpi-label">객단가</div><div class="kpi-value">${fmtKRW(avgAov)}</div></div>
  `;

  const mob = isMobile();
  const col = (key, label, hide) => {
    const sortCls = c24SortKey === key ? (c24SortDir === 1 ? "sort-asc" : "sort-desc") : "";
    const cls = [sortCls, hide ? "m-hide" : ""].filter(Boolean).join(" ");
    return `<th class="${cls}" onclick="c24SortBy('${key}')">${label}</th>`;
  };

  const sorted = [...rows].sort((a, b) => {
    const av = parseFloat(a[c24SortKey] ?? 0), bv = parseFloat(b[c24SortKey] ?? 0);
    return c24SortDir * (av - bv);
  });

  let html = `<table><thead><tr>
    ${col(nameKey, nameLabel)}
    ${col("order_amount",          "매출")}
    ${col("order_count",           "구매수")}
    ${col("inflow_count",          "유입수",           mob)}
    ${col("purchase_rate",         "구매율",           mob)}
    ${col("order_amount_per_order","객단가",           mob)}
    ${col("order_amount_per_inflow","방문당매출",      mob)}
  </tr></thead><tbody>`;

  let tS = 0, tO = 0, tI = 0;
  sorted.forEach(r => {
    tS += parseInt(r.order_amount  || 0);
    tO += parseInt(r.order_count   || 0);
    tI += parseInt(r.inflow_count  || 0);
    const nm = r[nameKey] || "(없음)";
    const cvr = parseFloat(r.purchase_rate || 0);
    const mh = mob ? ' m-hide' : '';
    html += `<tr>
      <td class="cell-name" title="${nm}">${nm}</td>
      <td>${fmtKRW(r.order_amount || 0)}</td>
      <td>${parseInt(r.order_count || 0).toLocaleString()}</td>
      <td class="${mh.trim()}">${parseInt(r.inflow_count || 0).toLocaleString()}</td>
      <td class="${mh.trim()}">${cvr > 0 ? cvr.toFixed(1) + "%" : "—"}</td>
      <td class="${mh.trim()}">${r.order_amount_per_order > 0 ? fmtKRW(r.order_amount_per_order) : "—"}</td>
      <td class="${mh.trim()}">${r.order_amount_per_inflow > 0 ? fmtKRW(r.order_amount_per_inflow) : "—"}</td>
    </tr>`;
  });

  const tCvr = tI > 0 ? (tO / tI * 100).toFixed(1) + "%" : "—";
  const tAov = tO > 0 ? fmtKRW(Math.round(tS / tO)) : "—";
  const mhT = mob ? ' m-hide' : '';
  html += `<tr class="total-row">
    <td>합계 (${sorted.length}개)</td>
    <td>${fmtKRW(tS)}</td>
    <td>${tO.toLocaleString()}</td>
    <td class="${mhT.trim()}">${tI.toLocaleString()}</td>
    <td class="${mhT.trim()}">${tCvr}</td>
    <td class="${mhT.trim()}">${tAov}</td>
    <td class="${mhT.trim()}">—</td>
  </tr>`;
  html += "</tbody></table>";

  document.getElementById("c24TableContent").innerHTML = html;
  document.getElementById("c24TableTitle").textContent = `카페24 ${nameLabel} (${dateLabel})`;
  document.getElementById("c24TableMeta").textContent  = `${sorted.length}개`;
}

function renderTodayProductSales() {
  const container = document.getElementById("todayProductSales");
  if (!container) return;
  const h = window.CAFE24_HISTORY;
  if (!h) { container.style.display = "none"; return; }
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayData = h[todayStr];
  if (!todayData) { container.style.display = "none"; return; }

  const TYPE_COLORS = {'노즈픽션':'#34d399','키즈픽션':'#38bdf8','템퍼픽션':'#fb923c','아토픽션':'#f87171','노즈스파':'#86efac','노즈브리즈':'#a3e635','슬로우픽션':'#e879f9','키로메디':'#fbbf24','바이오턴':'#60a5fa','디오스톡':'#a78bfa','기타':'#6e7681'};
  const BRANDS_CFG = [
    { id: 'ridermune', label: '리더뮨', color: '#4ade80' },
    { id: 'outcoma',   label: '아웃코마', color: '#a78bfa' }
  ];

  const now = new Date();
  const updateLabel = `${now.getHours().toString().padStart(2,'0')}:00 기준`;

  let html = `<div style="margin-bottom:14px;display:flex;align-items:center;gap:8px">
    <span style="font-size:11px;color:#6e7681;letter-spacing:0.08em;text-transform:uppercase;font-weight:600">오늘 직접매출</span>
    <span style="font-size:11px;color:#3a4050">${updateLabel} · 30분 자동 갱신</span>
  </div>`;

  let hasAny = false;
  BRANDS_CFG.forEach(bc => {
    const bd = todayData[bc.id];
    if (!bd?.products?.length) return;

    const typeMap = {};
    bd.products.forEach(p => {
      const amt = parseInt(p.order_amount || 0);
      if (!amt) return;
      const ptype = c24ProductType(p.product_name);
      if (!typeMap[ptype]) typeMap[ptype] = { sales: 0, orders: 0 };
      typeMap[ptype].sales  += amt;
      typeMap[ptype].orders += parseInt(p.order_count || 0);
    });

    const types = Object.entries(typeMap)
      .filter(([, v]) => v.sales > 0)
      .sort((a, b) => b[1].sales - a[1].sales);
    if (!types.length) return;

    hasAny = true;
    const total = types.reduce((s, [, v]) => s + v.sales, 0);

    html += `<div style="margin-bottom:18px">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:${bc.color};text-transform:uppercase;margin-bottom:10px">${bc.label} <span style="color:#4e5564;font-weight:400;font-size:11px">· 합계 ${fmtKRW(total)}</span></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">`;

    types.forEach(([ptype, data]) => {
      const color = TYPE_COLORS[ptype] || '#6e7681';
      html += `<div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 18px;display:flex;flex-direction:column;gap:5px">
        <span style="font-size:11px;font-weight:700;color:${color}">${ptype}</span>
        <span style="font-size:20px;font-weight:800;color:#f0f6fc;letter-spacing:-0.5px">${fmtKRW(data.sales)}</span>
        <span style="font-size:11px;color:#6e7681">${data.orders.toLocaleString()}건</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (!hasAny) { container.style.display = "none"; return; }

  container.innerHTML = html;
  container.style.display = "block";
}

// 브랜드 선택 화면 표시 시 항상 호출
function showBrandScreen() {
  document.getElementById("dashboard").style.display   = "none";
  document.getElementById("brandScreen").style.display = "flex";
  allData = [];
  renderTodayProductSales();
}

window.addEventListener('load', () => {
  // 비밀번호 화면 통과 후 브랜드 화면 뜰 때 실행
  setTimeout(renderTodayProductSales, 200);
});
